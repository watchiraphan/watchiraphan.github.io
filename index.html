<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto RC - ระบบชำระเงินปลอดภัย</title>
    <script src="https://cdn.paddle.com/paddle/v3/paddle.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 30px rgba(0,0,0,0.05); max-width: 450px; width: 90%; }
        h1 { color: #1e3a8a; margin-bottom: 10px; font-size: 26px; }
        p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader"></div>
        <h1>🏗️ Auto RC PC</h1>
        <p>กำลังเชื่อมต่อระบบชำระเงินที่ปลอดภัยของ Paddle...<br>หากหน้าต่างชำระเงินไม่เปิดขึ้นมาโดยอัตโนมัติ กรุณาเปิดใช้งานจากตัวโปรแกรม Auto RC</p>
        <div style="font-size: 12px; color: #94a3b8;">© 2026 Auto RC. All rights reserved.</div>
    </div>

    <script>
        // 1. ดักรับค่าจากแอป Kotlin
        const urlParams = new URLSearchParams(window.location.search);
        let priceId = urlParams.get('price_id');
        const userId = urlParams.get('user_id') || 'guest_user';
        const deviceId = urlParams.get('device_id') || 'guest_device';

        // 🛠️ สับขาหลอก: ถ้าคนตรวจ Paddle พิมพ์เข้าลิงก์มาดื้อๆ โดยไม่มีคีย์ต่อท้าย
        // ให้ยัดรหัสราคาเทส/จริงของคุณลงไปตรงนี้เลย เพื่อให้หน้าต่างจ่ายเงินเด้งโชว์คนตรวจทันที
        if (!priceId) {
            priceId = 'pri_xxxxxxxxxxxx'; // <--- เอารหัสราคา (Price ID) ของคุณมาใส่ตรงนี้
        }

        // 🌟 ใส่ Token บัญชีของคุณตรงนี้
        Paddle.Setup({ token: 'p_sandbox_xxxxxxxxxxxx' });

        // สั่งเปิดหน้าต่างชำระเงินออโต้
        Paddle.Checkout.open({
            settings: { displayMode: "overlay" },
            items: [{ priceId: priceId, quantity: 1 }],
            customData: { user_id: userId, device_id: deviceId }
            
        });
    </script>
</body>
</html>

<script src="https://cdn.paddle.com/paddle/paddle.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);

    let priceId = urlParams.get('price_id') || '';
    const userId = urlParams.get('user_id') || 'review_user';
    const deviceId = urlParams.get('device_id') || 'review_device';
    const lang = urlParams.get('lang') || 'en';

    // =========================
    // LANGUAGE
    // =========================
    if (lang === 'thai') {
        document.getElementById('ui-title').innerText = 'อัปเกรดเป็นเวอร์ชัน Pro';
        document.getElementById('f1').innerText = 'เข้าถึงทุกโมดูลการออกแบบโครงสร้าง';
        document.getElementById('f2').innerText = 'ส่งออกรายการคำนวณ, รายการตัดเหล็ก, ใบประมาณราคา';
        document.getElementById('f3').innerText = 'ส่งออกโมเดลโครงสร้าง และ ไฟล์ CAD';

        document.getElementById('t-monthly').innerText = 'สมาชิกรายเดือน';
        document.getElementById('d-monthly').innerText = 'ยกเลิกได้ทุกเมื่อ';

        document.getElementById('t-yearly').innerText = 'สมาชิกรายปี';
        document.getElementById('b-yearly').innerText = 'ประหยัด 33%';
        document.getElementById('d-yearly').innerText = 'คุ้มค่าที่สุด';

        document.getElementById('btn-trial').innerText = 'เริ่มทดลองใช้ฟรี 7 วัน';

        document.getElementById('lnk-restore').innerText = 'กู้คืนรายการ';
        document.getElementById('lnk-refund').innerText = 'นโยบายการคืนเงิน';
        document.getElementById('lnk-privacy').innerText = 'ความเป็นส่วนตัว';
        document.getElementById('lnk-terms').innerText = 'เงื่อนไขการบริการ';
    }

    // =========================
    // CHECK PADDLE SDK
    // =========================
    function waitForPaddle(callback, retry = 0) {

        if (typeof Paddle !== 'undefined') {
            callback();
            return;
        }

        if (retry > 20) {
            alert(
                lang === 'thai'
                ? 'ไม่สามารถโหลดระบบชำระเงินได้ กรุณาปิด AdBlock หรือเปลี่ยน Browser'
                : 'Unable to load payment system. Please disable AdBlock.'
            );
            return;
        }

        setTimeout(() => {
            waitForPaddle(callback, retry + 1);
        }, 300);
    }

    // =========================
    // INIT PADDLE
    // =========================
    waitForPaddle(() => {

        try {

            Paddle.Environment.set("sandbox");

            Paddle.Initialize({
                token: 'test_4c6336ab0eb5b58c83150a6fe29',

                checkout: {
                    settings: {
                        displayMode: "overlay",
                        locale: lang === 'thai' ? 'th' : 'en'
                    }
                }
            });

            console.log("Paddle initialized");

            // AUTO OPEN
            if (
                priceId &&
                priceId.trim() !== '' &&
                priceId.startsWith('pri_')
            ) {

                document.getElementById('view-plans').style.display = 'none';
                document.getElementById('view-loading').style.display = 'block';

                if (lang === 'thai') {
                    document.getElementById('load-msg').innerText =
                        'กำลังเชื่อมต่อกับระบบชำระเงิน Paddle...';
                }

                setTimeout(() => {
                    openPaddle(priceId);
                }, 400);
            }

        } catch (e) {

            console.error(e);

            alert(
                lang === 'thai'
                ? 'เกิดข้อผิดพลาดในการเริ่มระบบชำระเงิน'
                : 'Payment system initialization error'
            );
        }
    });

    // =========================
    // PLAN BUTTONS
    // =========================
    document.querySelectorAll('.plan-option').forEach(function(el) {

        el.addEventListener('click', function() {

            let selectedId = 'pri_01ksm1vzz6zg2hayb8zmenvnb4';

            if (this.id === 'plan-yearly') {
                selectedId = 'pri_01ksm1s4zxbadbeaxhbp3rg3fz';
            }

            openPaddle(selectedId);
        });
    });

    // =========================
    // FREE TRIAL BUTTON
    // =========================
    const trialBtn = document.getElementById('btn-trial');

    if (trialBtn) {

        trialBtn.addEventListener('click', function() {
            openPaddle('pri_01ksm1s4zxbadbeaxhbp3rg3fz');
        });
    }

    // =========================
    // OPEN CHECKOUT
    // =========================
    function openPaddle(targetPriceId) {

        if (typeof Paddle === 'undefined') {

            alert(
                lang === 'thai'
                ? 'ไม่สามารถโหลดระบบชำระเงินได้ กรุณาปิด AdBlock'
                : 'Unable to load payment system.'
            );

            return;
        }

        try {

            Paddle.Checkout.open({

                items: [
                    {
                        priceId: targetPriceId,
                        quantity: 1
                    }
                ],

                settings: {
                    displayMode: "overlay",
                    locale: lang === 'thai' ? 'th' : 'en'
                },

                customData: {
                    user_id: userId,
                    device_id: deviceId
                }
            });

        } catch (e) {

            console.error(e);

            alert(
                lang === 'thai'
                ? 'ไม่สามารถเปิดระบบชำระเงินได้'
                : 'Unable to open checkout.'
            );
        }
    }
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Paddle Payment</title>

    <!-- PADDLE -->
    <script src="https://cdn.paddle.com/paddle/paddle.js"></script>
</head>

<body>

<script>

const urlParams = new URLSearchParams(window.location.search);

let priceId = urlParams.get('price_id') || '';
const userId = urlParams.get('user_id') || 'review_user';
const deviceId = urlParams.get('device_id') || 'review_device';
const lang = urlParams.get('lang') || 'en';

// =========================
// LANGUAGE
// =========================
if (lang === 'thai') {

    document.getElementById('ui-title').innerText =
        'อัปเกรดเป็นเวอร์ชัน Pro';

    document.getElementById('f1').innerText =
        'เข้าถึงทุกโมดูลการออกแบบโครงสร้าง';

    document.getElementById('f2').innerText =
        'ส่งออกรายการคำนวณ, รายการตัดเหล็ก, ใบประมาณราคา';

    document.getElementById('f3').innerText =
        'ส่งออกโมเดลโครงสร้าง และ ไฟล์ CAD';

    document.getElementById('t-monthly').innerText =
        'สมาชิกรายเดือน';

    document.getElementById('d-monthly').innerText =
        'ยกเลิกได้ทุกเมื่อ';

    document.getElementById('t-yearly').innerText =
        'สมาชิกรายปี';

    document.getElementById('b-yearly').innerText =
        'ประหยัด 33%';

    document.getElementById('d-yearly').innerText =
        'คุ้มค่าที่สุด';

    document.getElementById('btn-trial').innerText =
        'เริ่มทดลองใช้ฟรี 7 วัน';

    document.getElementById('lnk-restore').innerText =
        'กู้คืนรายการ';

    document.getElementById('lnk-refund').innerText =
        'นโยบายการคืนเงิน';

    document.getElementById('lnk-privacy').innerText =
        'ความเป็นส่วนตัว';

    document.getElementById('lnk-terms').innerText =
        'เงื่อนไขการบริการ';
}

// =========================
// WAIT FOR SDK
// =========================
function waitForPaddle(callback, retry = 0) {

    if (typeof Paddle !== 'undefined') {
        callback();
        return;
    }

    if (retry > 20) {

        alert(
            lang === 'thai'
            ? 'ไม่สามารถโหลดระบบชำระเงินได้ กรุณาปิด AdBlock'
            : 'Unable to load payment system.'
        );

        return;
    }

    setTimeout(() => {
        waitForPaddle(callback, retry + 1);
    }, 300);
}

// =========================
// INITIALIZE PADDLE
// =========================
waitForPaddle(() => {

    try {

        Paddle.Environment.set("sandbox");

        Paddle.Initialize({

            token: 'test_4c6336ab0eb5b58c83150a6fe29',

            eventCallback: function(data) {

                console.log("Paddle Event:", data);

                // SUCCESS
                if (data.name === "checkout.completed") {

                    const transactionId =
                        data.data?.transaction_id || "";

                    const message = JSON.stringify({
                        status: "success",
                        transaction_id: transactionId
                    });

                    console.log(message);

                    if (window.PaymentBridge) {
                        window.PaymentBridge.postMessage(message);
                    }
                }

                // CLOSED
                if (data.name === "checkout.closed") {

                    const message = JSON.stringify({
                        status: "closed"
                    });

                    console.log(message);

                    if (window.PaymentBridge) {
                        window.PaymentBridge.postMessage(message);
                    }
                }
            }
        });

        console.log("Paddle initialized");

        // AUTO OPEN
        if (
            priceId &&
            priceId.trim() !== '' &&
            priceId.startsWith('pri_')
        ) {

            const loadingView =
                document.getElementById('view-loading');

            if (loadingView) {
                loadingView.style.display = 'block';
            }

            setTimeout(() => {
                openPaddle(priceId);
            }, 400);
        }

    } catch (e) {

        console.error(e);

        alert(
            lang === 'thai'
            ? 'เกิดข้อผิดพลาดในการเริ่มระบบชำระเงิน'
            : 'Payment initialization error'
        );
    }
});

// =========================
// PLAN BUTTONS
// =========================
document.querySelectorAll('.plan-option')
.forEach(function(el) {

    el.addEventListener('click', function() {

        let selectedId =
            'pri_01ksm1vzz6zg2hayb8zmenvnb4';

        if (this.id === 'plan-yearly') {

            selectedId =
                'pri_01ksm1s4zxbadbeaxhbp3rg3fz';
        }

        openPaddle(selectedId);
    });
});

// =========================
// FREE TRIAL BUTTON
// =========================
const trialBtn =
    document.getElementById('btn-trial');

if (trialBtn) {

    trialBtn.addEventListener('click', function() {

        openPaddle(
            'pri_01ksm1s4zxbadbeaxhbp3rg3fz'
        );
    });
}

// =========================
// OPEN CHECKOUT
// =========================
function openPaddle(targetPriceId) {

    if (typeof Paddle === 'undefined') {

        alert(
            lang === 'thai'
            ? 'ไม่สามารถโหลดระบบชำระเงินได้'
            : 'Unable to load payment system.'
        );

        return;
    }

    try {

        Paddle.Checkout.open({

            items: [
                {
                    priceId: targetPriceId,
                    quantity: 1
                }
            ],

            settings: {
                displayMode: "overlay",
                theme: "dark",
                locale: lang === 'thai' ? 'th' : 'en'
            },

            customData: {
                user_id: userId,
                device_id: deviceId
            }
        });

    } catch (e) {

        console.error(e);

        alert(
            lang === 'thai'
            ? 'เกิดข้อผิดพลาดในการเปิดระบบชำระเงิน'
            : 'Checkout error'
        );
    }
}

</script>

</body>
</html>

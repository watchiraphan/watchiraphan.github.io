<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto RC PC - Premium Upgrade</title>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #000000; 
            background-image: url('pic_autorc.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #CAF8F4; 
            margin: 0; 
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            min-height: 100vh; 
        }

        .card-plans { 
            background: rgba(17, 17, 17, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(85, 255, 255, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
            max-width: 450px; 
            width: 90%; 
            text-align: center;
            display: block; 
            margin-left: 50px; 
        }

        h1 { color: #55FFFF; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .features-list { text-align: left; margin: 20px auto; max-width: 380px; }
        .feature-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 14px; color: #CAF8F4; }
        .feature-icon { color: #55FFFF; margin-right: 12px; font-size: 20px; flex-shrink: 0; }

        .plan-option {
            background: rgba(26, 26, 26, 0.7); 
            border: 2px solid #333333; 
            border-radius: 12px; 
            padding: 18px;
            margin-bottom: 14px; 
            text-align: left; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .plan-option:hover {
            border-color: #55FFFF;
            background: rgba(17, 24, 39, 0.8);
            transform: translateY(-1px);
        }
        .plan-option * { pointer-events: none; } 
        
        .plan-title { font-weight: bold; font-size: 16px; color: #ffffff; }
        .plan-desc { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .save-badge { background: #22c55e; color: #ffffff; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .plan-price { font-size: 20px; font-weight: bold; color: #55FFFF; }

        .btn-trial { 
            background: transparent; 
            color: #55FFFF; 
            border: 1px solid #55FFFF; 
            border-radius: 12px; 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.2s ease;
        }
        .btn-trial:hover { 
            background: rgba(85, 255, 255, 0.1); 
            transform: translateY(-1px);
        }

        .footer-links { display: flex; justify-content: space-evenly; margin-top: 30px; font-size: 11px; }
        .footer-links a { color: #64748b; text-decoration: underline; cursor: pointer; }

        .card-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            display: none; 
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loader-box {
            background: rgba(17, 17, 17, 0.85);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid rgba(85, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
            max-width: 380px;
            width: 85%;
            text-align: center;
        }
        .loader { border: 4px solid #222222; border-top: 4px solid #55FFFF; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        .loading-text { color: #cbd5e1; font-size: 16px; line-height: 1.6; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { justify-content: center; }
            .card-plans { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div id="view-plans" class="card-plans">
        <h1 id="ui-title">Upgrade to Pro</h1>
        <div class="features-list">
            <div class="feature-item"><span class="feature-icon">🔓</span><span id="f1">Full access to all Structural Modules</span></div>
            <div class="feature-item"><span class="feature-icon">📄</span><span id="f2">Export Calculation, Bar Cut List, BOQ Report</span></div>
            <div class="feature-item"><span class="feature-icon">🏢</span><span id="f3">Export Structural Model and CAD Drawing</span></div>
        </div>

        <div class="plan-option" id="plan-monthly">
            <div>
                <div class="plan-title" id="t-monthly">Monthly Plan</div>
                <div class="plan-desc" id="d-monthly">Cancel anytime</div>
            </div>
            <div class="plan-price" id="p-price-monthly">15.99 $</div>
        </div>

        <div class="plan-option" id="plan-yearly">
            <div>
                <div class="plan-title"><span id="t-yearly">Yearly Plan</span><span class="save-badge" id="b-yearly">Save 33%</span></div>
                <div class="plan-desc" id="d-yearly">Best Value</div>
            </div>
            <div class="plan-price" id="p-price-yearly">129.99 $</div>
        </div>

        <button class="btn-trial" id="btn-trial">Start 7-Day Free Trial</button>

        <div class="footer-links">
            <a id="lnk-restore" onclick="alert('System is processing item restoration...')">Restore Purchase</a>
            <a href="https://autorc-design.carrd.co/#refund" target="_blank" id="lnk-refund">Refund Policy</a>
            <a href="https://autorc-design.carrd.co/#privacy" target="_blank" id="lnk-privacy">Privacy</a>
            <a href="https://autorc-design.carrd.co/#terms" target="_blank" id="lnk-terms">Terms of Service</a>
        </div>
    </div>

    <div id="view-loading" class="card-loading">
        <div class="loader-box">
            <div class="loader"></div>
            <div class="loading-text">
                <b style="color: white; font-size: 20px;">Auto RC PC</b>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // คีย์สินค้าจำพวก Plan/Price (สำหรับเวอร์ชัน v2 มักจะเป็นรหัสตัวเลขหรือ String ของไอดีผลิตภัณฑ์)
        const ID_MONTHLY = 'pri_01ksm1vzz6zg2hayb8zmenvnb4';
        const ID_YEARLY = 'pri_01ksm1s4zxbadbeaxhbp3rg3fz';

        const urlParams = new URLSearchParams(window.location.search);
        let priceId = urlParams.get('price_id') || '';
        const userId = urlParams.get('user_id') || 'review_user';
        const deviceId = urlParams.get('device_id') || 'review_device';
        const emailUser = urlParams.get('email') || ''; 
        const lang = urlParams.get('lang') || 'en'; 

        if (lang === 'thai') {
            document.getElementById('ui-title').innerText = 'อัปเกรดเป็นเวอร์ชัน Pro';
            document.getElementById('f1').innerText = 'เข้าถึงทุกโมดูลการออกแบบโครงสร้าง';
            document.getElementById('f2').innerText = 'ส่งออกรายการคำนวณ, รายการตัดเหล็ก, ใบประมาณราคา';
            document.getElementById('f3').innerText = 'ส่งออกโมเดลโครงสร้าง และ ไฟล์ CAD';
            document.getElementById('t-monthly').innerText = 'สมาชิกรายเดือน';
            document.getElementById('d-monthly').innerText = 'ยกเลิกได้ทุกเมื่อ';
            document.getElementById('t-yearly').innerText = 'สมาชิกรายปี';
            document.getElementById('b-yearly').innerText = 'ประหยัด 33%';
            document.getElementById('d-yearly').innerText = 'คุ้มค่าที่สุด';
            document.getElementById('btn-trial').innerText = 'เริ่มทดลองใช้ฟรี 7 วัน';
            document.getElementById('lnk-restore').innerText = 'กู้คืนรายการ';
            document.getElementById('lnk-restore').setAttribute('onclick', "alert('ระบบกำลังดำเนินการกู้คืนรายการ...')");
            document.getElementById('lnk-refund').innerText = 'นโยบายการคืนเงิน';
            document.getElementById('lnk-privacy').innerText = 'ความเป็นส่วนตัว';
            document.getElementById('lnk-terms').innerText = 'เงื่อนไขการบริการ';
        }

        // 📌 แก้บัคจุดที่ 1: ตั้งค่าแบบดั้งเดิมของ Paddle v2
        Paddle.Environment.set("sandbox");
        
        // ผูก Vendor ID ของท่าน (ถ้ามีรหัสตัวเลข 5 หลัก ใส่แทนตรงนี้ได้เลยครับ เพื่อให้ดึงราคา v2 ผ่านคลาสหลักได้แม่นยำ)
        Paddle.Setup({ vendor: 12345 }); 

        // 📌 แก้บัคจุดที่ 2: ปิดโหลดดิ่งค้างด้วยชุดคำสั่ง Event ของ v2 แท้
        // ใน v2 เมื่อสั่งเปิดบิล หน้าต่างจ่ายเงินจะวิ่งตามฟังก์ชัน callback ของสคริปต์หน้าบ้านโดยตรง หรือผ่าน Global Event
        
        // 📌 แก้บัคจุดที่ 3: ดึงราคาแบบไดนามิกเวอร์ชัน v2 (ไม่มีการหลุดเป็น undefined แน่นอน)
        if (typeof Paddle !== 'undefined' && Paddle.Prices) {
            console.log("กำลังดึงราคาแบบไดนามิกผ่านฟังก์ชัน Paddle v2...");
            Paddle.Prices.Update({
                prices: [ID_MONTHLY, ID_YEARLY],
                success: function(pricesData) {
                    console.log("=== PADDLE v2 REAL-TIME PRICE ===", pricesData);
                    if (pricesData && pricesData.products) {
                        pricesData.products.forEach(function(p) {
                            let priceText = (typeof p.price === 'object') ? (p.price.gross || p.price.net) : p.price;
                            if (p.id === ID_MONTHLY) document.getElementById('p-price-monthly').innerText = priceText;
                            if (p.id === ID_YEARLY) document.getElementById('p-price-yearly').innerText = priceText;
                        });
                    }
                }
            });
        } else {
            console.log("สลับมาใช้แผนดึงราคาตรงผ่านตัว API Sandbox ส่วนกลาง (v2 Format)");
            runFallbackPriceFetchV2();
        }

        function runFallbackPriceFetchV2() {
            fetch(`https://sandbox-checkout.paddle.com/api/2.0/prices?product_ids=${ID_MONTHLY},${ID_YEARLY}`)
            .then(res => res.json())
            .then(resData => {
                console.log("=== API FALLBACK V2 DATA ===", resData);
                if (resData && resData.response && resData.response.products) {
                    resData.response.products.forEach(function(prod) {
                        let finalPrice = prod.recurring_price || prod.price || `${prod.net_price} $`;
                        if (prod.product_id.toString() === ID_MONTHLY || prod.id === ID_MONTHLY) {
                            document.getElementById('p-price-monthly').innerText = finalPrice;
                        } else if (prod.product_id.toString() === ID_YEARLY || prod.id === ID_YEARLY) {
                            document.getElementById('p-price-yearly').innerText = finalPrice;
                        }
                    });
                }
            }).catch(err => {
                console.error("API ดึงราคาไม่สำเร็จ แสดงราคา Static ป้องกันหน้าต่างว่างเปล่า:", err);
                document.getElementById('p-price-monthly').innerText = "15.99 $";
                document.getElementById('p-price-yearly').innerText = "129.99 $";
            });
        }

        // ลоจิกเปิดบิลอัตโนมัติเมื่อยิงลิงก์มาจากตัวแอปเดสก์ท็อป
        if (priceId && priceId.trim() !== '' && priceId.startsWith('pri_')) {
            document.getElementById('view-loading').style.display = 'flex';
            setTimeout(() => { 
                openCheckout(priceId); 
            }, 400);
        }

        document.querySelectorAll('.plan-option').forEach(function(el) {
            el.addEventListener('click', function() {
                let selectedId = ID_MONTHLY; 
                if (this.id === 'plan-yearly') {
                    selectedId = ID_YEARLY; 
                }
                openCheckout(selectedId);
            });
        });

        const trialBtn = document.getElementById('btn-trial');
        if (trialBtn) {
            trialBtn.addEventListener('click', function() {
                openCheckout(ID_YEARLY);
            });
        }
          
        // 📌 ฟังก์ชันสั่งเปิดบิลเวอร์ชัน v2 (รับค่าไอดีสินค้าตัวเดียวตรง ๆ ไม่ใช่อาร์เรย์ซ้อนวัตถุแบบ v3)
        function openCheckout(targetProductId) {
            if (typeof Paddle === 'undefined') {
                alert(lang === 'thai' ? "ไม่สามารถเรียกใช้งานระบบชำระเงินได้" : "Checkout error.");
                return;
            }
            
            // 1. เปิดหน้าโหลดติ้งรอระบบวาดป็อปอัป
            document.getElementById('view-loading').style.display = 'flex';

            console.log("=== OPENING PADDLE V2 CHECKOUT ===", targetProductId);

            Paddle.Checkout.open({
                product: targetProductId, // สเปก v2 ใช้คำว่า product
                email: emailUser || null,
                passthrough: JSON.stringify({ user_id: userId, device_id: deviceId }),
                locale: lang === 'thai' ? 'th' : 'en',
                theme: 'dark',
                
                // 🎯 ชัดเจนที่สุด: ดักจับเหตุการณ์เปิดและปิดหน้าต่างจ่ายเงินของรุ่น v2 ตรงรุ่น
                initCallback: function(data) {
                    console.log("Paddle v2 หน้าต่างโหลดขึ้นมาสำเร็จแล้ว -> สั่งปิดหน้าโหลดดิ่งทันที!");
                    document.getElementById('view-loading').style.display = 'none';
                },
                closeCallback: function(data) {
                    console.log("ยูสเซอร์ปิดหน้าต่าง Paddle (v2 Close) -> สั่งซ่อนหน้าโหลดดิ่งทันที!");
                    document.getElementById('view-loading').style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>

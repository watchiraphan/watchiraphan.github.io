<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto RC - Secure Payment</title>
    <script src="https://cdn.paddle.com/paddle/v3/paddle.js"></script>
    <style>
        /* [USER_REQUEST] 1. ธีมหลักเป็นสีดำ (Dark Mode) */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #000000; /* พื้นหลังดำสนิท */
            color: #f1f5f9; /* สีข้อความทั่วไปขาวนวล */
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center; 
        }

        /* การ์ดคอนเทนเนอร์ปรับให้เข้ากับ Dark Mode */
        .card { 
            background: #111111; /* สีพื้นหลังการ์ดดำเข้ม (อ่อนกว่า body นิดหน่อย) */
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid #222222; /* เพิ่มเส้นขอบบางๆ */
            box-shadow: 0 4px 30px rgba(0,0,0,0.5); /* ปรับเงาให้เข้ากับธีมดำ */
            max-width: 450px; 
            width: 90%; 
        }

        /* [USER_REQUEST] 2. โหลดดิ้งขอสีฟ้า */
        .loader { 
            border: 4px solid #333333; /* สีพื้นขอบโหลด */
            border-top: 4px solid #3b82f6; /* สีฟ้าสด (Spinner) */
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px; 
        }

        /* [USER_REQUEST] 3. Auto RC PC เป็นหัวข้อขาวนวล */
        h1 { 
            color: #f1f5f9; /* สีขาวนวล */
            margin-bottom: 10px; 
            font-size: 26px; 
        }

        /* [USER_REQUEST] 4. ข้อความรายละเอียดเป็นขาวเทา (อ่านง่ายบนพื้นหลังดำ) */
        p { 
            color: #cbd5e1; /* สีขาวเทาอ่อน */
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 25px; 
        }

        /* เครดิตท้ายเทาอ่อนมากๆ */
        .footer {
            font-size: 12px; 
            color: #94a3b8; /* สีเทาอ่อน (เกือบขาวแต่ยังดูเป็นส่วน footer) */
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader"></div>
        <h1>Auto RC PC</h1>
        <p>Connecting to Paddle's secure payment system...<br>If the checkout window does not open automatically, please relaunch it from the Auto RC application.</p>
        <div class="footer">© 2026 Auto RC. All rights reserved.</div>
    </div>

    <script>
        // 1. ดักรับค่าจากแอป Kotlin (ใช้ Price ID เทสเพื่อการรีวิว)
        const urlParams = new URLSearchParams(window.location.search);
        let priceId = urlParams.get('price_id');
        const userId = urlParams.get('user_id') || 'review_user';
        const deviceId = urlParams.get('device_id') || 'review_device';

        // 🛠️ Reviewer Fallback: ถ้าคนตรวจ Paddle พิมพ์เข้าลิงก์มาดื้อๆ
        // ให้ยัดรหัสราคาเทส/จริงของคุณลงไปตรงนี้เลย เพื่อให้หน้าต่างจ่ายเงินเด้งโชว์คนตรวจทันที
        if (!priceId) {
            priceId = 'pri_01ksm1vzz6zg2hayb8zmenvnb4'; // <--- เอารหัสราคา (Price ID) ของคุณมาใส่ตรงนี้
        }

        // 🌟 ใส่ Client Token บัญชีของคุณตรงนี้
        Paddle.Setup({ token: 'test_4c6336ab0eb5b58c83150a6fe29' });

        // สั่งเปิดหน้าต่างชำระเงินออโต้
        Paddle.Checkout.open({
            settings: { displayMode: "overlay" },
            items: [{ priceId: priceId, quantity: 1 }],
            customData: { user_id: userId, device_id: deviceId }
        });
    </script>
</body>
</html>
